name: Test

on:
  pull_request:

permissions: {}

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        experimental: [false]
        include:
          - python-version: '3.15-dev'
            # sets continue-on-error automatically
            experimental: true

    name: Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0

      - name: Setup python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      # memray sometimes lags on shipping -dev binaries,
      # so install these to build from source when that happens.
      # https://github.com/bloomberg/memray#building-from-source
      - name: Install memray build dependencies for Python -dev versions
        if: endsWith(matrix.python-version, '-dev')
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
            sudo apt-get update --yes && \
            sudo apt-get install --yes --no-install-recommends \
              libunwind-dev \
              liblz4-dev \
              libdebuginfod-dev

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip wheel
            python -m pip install tox tox-gh-actions

      - name: Test with tox
        run: |
          export PYTHONFAULTHANDLER=1
          tox
